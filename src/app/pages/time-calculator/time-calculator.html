<div class="p-4">
  <h1 class="mb-4">Time Calculator</h1>

  <div class="card" style="max-width: 400px">
    <div class="card-body">
      @for (input of inputs; track i; let i = $index) {
        <div class="input-group mb-2">
          <input
            #timeInput
            type="text"
            class="form-control"
            placeholder="mm/hh:mm"
            [(ngModel)]="inputs[i]"
            (ngModelChange)="onInputChange()"
          />
          <button
            class="btn btn-outline-danger"
            type="button"
            tabindex="-1"
            (click)="removeInput(i)"
            [disabled]="inputs.length <= 2"
          >
            &times;
          </button>
        </div>
      }

      <div class="border-top pt-3 d-flex justify-content-between align-items-center">
        <span class="text-muted">Total:</span>
        <span class="fs-4 fw-semibold">{{ totalFormatted }}</span>
      </div>

      <button class="btn btn-outline-secondary btn-sm w-100 mt-3" (click)="reverse()">
        Reverse
      </button>
    </div>
  </div>
</div>
